<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - MedRemind Lumina</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#0ea5e9', secondary: '#10b981', danger: '#ef4444' },
                    fontFamily: { display: ['Outfit', 'sans-serif'] }
                }
            }
        }
    </script>
</head>

<body>
    <div id="profile-app" class="animate-slide-up">
        <header class="mb-10">
            <h2 class="text-3xl font-display font-bold text-slate-800">Account Settings</h2>
            <p class="text-slate-400 font-medium mt-1">Manage your personal information and preferences</p>
        </header>

        <div class="grid grid-cols-12 gap-8">
            <!-- Left Column: Identity -->
            <div class="col-span-12 lg:col-span-4">
                <div class="card-white flex flex-col items-center text-center p-10">
                    <div class="relative mb-6">
                        <div
                            class="w-32 h-32 rounded-[2.5rem] bg-primary/10 border-4 border-white shadow-xl overflow-hidden p-1">
                            <img id="profile-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Sarah"
                                alt="Avatar" class="w-full h-full rounded-[2rem] object-cover">
                        </div>
                        <button id="camera-btn"
                            class="absolute -bottom-2 -right-2 w-10 h-10 bg-primary text-white rounded-xl shadow-lg border-4 border-white flex items-center justify-center hover:scale-110 transition-all"
                            title="Change avatar">
                            <i data-lucide="camera" class="w-5 h-5"></i>
                        </button>
                    </div>

                    <h3 id="display-name" class="text-2xl font-display font-bold text-slate-800">Sarah Jenkins</h3>
                    <p id="display-role" class="text-xs font-bold text-primary uppercase tracking-[0.2em] mt-1">Patient
                    </p>

                    <div class="w-full grid grid-cols-2 gap-4 mt-10">
                        <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                            <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Status</p>
                            <p class="text-sm font-bold text-emerald-500">Active</p>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                            <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Meds</p>
                            <p id="display-med-count" class="text-sm font-bold text-slate-800">5 Active</p>
                        </div>
                    </div>

                </div>
            </div>

            <!-- Right Column: Details -->
            <div class="col-span-12 lg:col-span-8 space-y-8">
                <div class="card-white">
                    <div class="flex items-center justify-between mb-8 pb-6 border-b border-slate-50">
                        <h4 class="text-xl font-display font-bold text-slate-800">Personal Information</h4>
                        <button id="edit-details-btn"
                            class="text-primary font-bold text-sm uppercase tracking-widest hover:underline">Edit
                            Details</button>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Full
                                Name</label>
                            <p id="detail-name" class="text-slate-800 font-medium">Sarah Jenkins</p>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Email
                                Address</label>
                            <p id="detail-email" class="text-slate-800 font-medium">sarah@lumina.health</p>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Age</label>
                            <p id="detail-age" class="text-slate-800 font-medium">28 Years</p>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Member
                                Since</label>
                            <p id="detail-joined" class="text-slate-800 font-medium">Jan 12, 2023</p>
                        </div>
                    </div>
                </div>

                <div class="card-white border-l-8 border-primary">
                    <div class="flex items-center gap-4 mb-8">
                        <div class="w-10 h-10 rounded-xl bg-primary/10 flex items-center justify-center text-primary">
                            <i data-lucide="shield-check"></i>
                        </div>
                        <h4 class="text-xl font-display font-bold text-slate-800">Health Verification</h4>
                    </div>
                    <div id="role-info"
                        class="p-6 bg-slate-50 rounded-3xl border border-slate-100 flex items-center justify-between">
                        <!-- Role specific info injected here -->
                    </div>
                </div>
            </div>

            <!-- Edit Details Form (hidden by default) -->
            <div id="edit-details-form" class="col-span-12 lg:col-span-8 hidden">
                <div class="card-white">
                    <div class="flex items-center justify-between mb-8 pb-6 border-b border-slate-50">
                        <h4 class="text-xl font-display font-bold text-slate-800">Edit Information</h4>
                        <button id="cancel-edit-btn"
                            class="text-slate-400 font-bold text-sm uppercase tracking-widest hover:underline">Cancel</button>
                    </div>
                    <form id="update-profile-form" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase mb-2 ml-1">Full Name</label>
                            <input type="text" id="edit-name"
                                class="w-full px-6 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-primary/20 transition-all">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase mb-2 ml-1">Age</label>
                            <input type="number" id="edit-age"
                                class="w-full px-6 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-primary/20 transition-all">
                        </div>
                        <div class="md:col-span-2">
                            <button type="submit"
                                class="w-full py-4 bg-primary text-white font-bold rounded-2xl shadow-lg shadow-sky-100 hover:scale-[1.02] active:scale-[0.98] transition-all">Save
                                Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/layout.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = JSON.parse(localStorage.getItem('user'));
            if (user) {
                document.getElementById('display-name').textContent = user.name;
                document.getElementById('detail-name').textContent = user.name;
                document.getElementById('detail-email').textContent = user.email;
                document.getElementById('detail-age').textContent = `${user.age || '--'} Years`;
                document.getElementById('display-role').textContent = user.role;
                document.getElementById('profile-avatar').src = `https://api.dicebear.com/7.x/avataaars/svg?seed=${user.name}`;

                const roleInfo = document.getElementById('role-info');
                if (user.role === 'patient') {
                    roleInfo.innerHTML = `
                        <div>
                            <p class="text-sm font-bold text-slate-800">Patient Identity Verified</p>
                            <p class="text-xs text-slate-400 mt-1">Your data is encrypted and HIPAA compliant.</p>
                        </div>
                        <i data-lucide="check-circle" class="text-emerald-500 w-8 h-8"></i>
                    `;
                } else if (user.role === 'doctor') {
                    roleInfo.innerHTML = `
                        <div>
                            <p class="text-sm font-bold text-slate-800">Clinical Credentials Active</p>
                            <p class="text-xs text-slate-400 mt-1">License Verified • Central Hospital Registry</p>
                        </div>
                        <i data-lucide="shield" class="text-primary w-8 h-8"></i>
                    `;
                } else {
                    roleInfo.innerHTML = `
                        <div>
                            <p class="text-sm font-bold text-slate-800">Caregiver Access Authorized</p>
                            <p class="text-xs text-slate-400 mt-1">Currently managing 3 patient profiles.</p>
                        </div>
                        <i data-lucide="users" class="text-sky-500 w-8 h-8"></i>
                    `;
                }
                lucide.createIcons();

                // Load live medicine count
                try {
                    const meds = await apiFetch('/medicines');
                    const activeMeds = meds.filter(m => (m.status || 'active') === 'active');
                    document.getElementById('display-med-count').textContent = `${activeMeds.length} Active`;
                } catch (e) { /* keep placeholder */ }

                // Logout button
                document.getElementById('logout-btn')?.addEventListener('click', () => {
                    localStorage.clear();
                    window.location.href = '/pages/index.html';
                });

                // Camera button
                document.getElementById('camera-btn')?.addEventListener('click', () => {
                    alert('Avatar is auto-generated from your name. Custom uploads coming soon!');
                });

                // Edit Details toggle
                const infoPanel = document.querySelector('.col-span-12.lg\\:col-span-8.space-y-8');
                document.getElementById('edit-details-btn')?.addEventListener('click', () => {
                    infoPanel?.classList.add('hidden');
                    document.getElementById('edit-details-form')?.classList.remove('hidden');
                    document.getElementById('edit-name').value = user.name || '';
                    document.getElementById('edit-age').value = user.age || '';
                });

                document.getElementById('cancel-edit-btn')?.addEventListener('click', () => {
                    infoPanel?.classList.remove('hidden');
                    document.getElementById('edit-details-form')?.classList.add('hidden');
                });

                document.getElementById('update-profile-form')?.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const btn = e.target.querySelector('button[type="submit"]');
                    btn.disabled = true;
                    btn.textContent = 'Saving...';
                    const name = document.getElementById('edit-name').value.trim();
                    const age = document.getElementById('edit-age').value;
                    try {
                        await apiFetch('/users/profile', {
                            method: 'PUT',
                            body: JSON.stringify({ name, age })
                        });
                        const updatedUser = { ...user, name, age };
                        localStorage.setItem('user', JSON.stringify(updatedUser));
                        alert('Profile updated successfully!');
                        window.location.reload();
                    } catch (err) {
                        alert('Failed to update profile. Please try again.');
                        btn.disabled = false;
                        btn.textContent = 'Save Changes';
                    }
                });
            }
        });
    </script>
</body>

</html>
</body>

</html>
