<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - MedRemind Lumina</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#0ea5e9', secondary: '#10b981', danger: '#ef4444' },
                    fontFamily: { display: ['Outfit', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body>
    <div id="dashboard-app" class="animate-slide-up">
        <!-- Content will be dynamically injected by dashboard.js based on role -->
        <div class="flex items-center justify-center min-h-[60vh]">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-primary"></div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/scheduler.js"></script>
</body>
</html>
