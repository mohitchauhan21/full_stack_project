<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - MedRemind</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#0ea5e9' },
                    fontFamily: { display: ['Outfit', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4 font-['Inter']">
    <div class="max-w-lg w-full bg-white p-10 rounded-[2.5rem] shadow-xl shadow-slate-200/50 border border-slate-100">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-display font-bold text-primary mb-2">Join Us</h1>
            <p class="text-slate-400 font-medium">Start managing health effectively</p>
        </div>
        
        <form id="register-form" class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="reg-name" placeholder="Full Name" required class="w-full px-6 py-4 bg-slate-50 border-slate-100 rounded-2xl focus:ring-2 focus:ring-primary/20 outline-none">
                <input type="email" id="reg-email" placeholder="Email" required class="w-full px-6 py-4 bg-slate-50 border-slate-100 rounded-2xl focus:ring-2 focus:ring-primary/20 outline-none">
            </div>
            <input type="password" id="reg-password" placeholder="Password" required class="w-full px-6 py-4 bg-slate-50 border-slate-100 rounded-2xl focus:ring-2 focus:ring-primary/20 outline-none">
            
            <div class="flex flex-col gap-1">
                <label class="text-xs font-bold text-slate-400 uppercase ml-1">Account Role</label>
                <select id="role-select" class="w-full px-6 py-4 bg-slate-50 border-slate-100 rounded-2xl focus:ring-2 focus:ring-primary/20 outline-none">
                    <option value="patient">Patient</option>
                    <option value="caregiver">Caregiver</option>
                    <option value="doctor">Doctor</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <input type="number" id="reg-age" placeholder="Age" class="w-full px-6 py-4 bg-slate-50 border-slate-100 rounded-2xl outline-none">
                <input type="text" id="reg-doctor" placeholder="Doctor Name" class="w-full px-6 py-4 bg-slate-50 border-slate-100 rounded-2xl outline-none">
            </div>

            <button type="submit" 
                class="w-full py-5 bg-primary text-white font-bold rounded-2xl shadow-lg shadow-sky-100 mt-6 hover:scale-[1.01] active:scale-[0.99] transition-all">
                Create Account
            </button>
        </form>
        
        <div class="mt-8 text-center">
            <p class="text-slate-500">Already a member? <a href="index.html" class="text-primary font-bold">Sign In</a></p>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
