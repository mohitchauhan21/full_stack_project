<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MedRemind</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#0ea5e9' },
                    fontFamily: { display: ['Outfit', 'sans-serif'] }
                }
            }
        }
    </script>
  <script crossorigin src="/assets/index-aa8f5a04.js"></script>
</head>
<body class="bg-slate-50 dark:bg-slate-900/50 flex items-center justify-center min-h-screen p-4 font-['Inter']">
    <div class="max-w-md w-full bg-white p-10 rounded-[2.5rem] shadow-sm border border-slate-200 dark:border-slate-700 dark:shadow-none border border-slate-100 dark:border-slate-700">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-display font-bold text-primary mb-2">MedRemind</h1>
            <p class="text-slate-400 dark:text-slate-500 font-medium">Healthcare management made simple</p>
        </div>
        
        <form id="login-form" class="space-y-6">
            <div>
                <label class="block text-xs font-bold text-slate-400 dark:text-slate-500 uppercase mb-2 ml-1">Email Address</label>
                <input type="email" id="login-email" placeholder="name@example.com" required
                    class="w-full px-6 py-4 bg-slate-50 dark:bg-slate-900/50 border border-slate-100 dark:border-slate-700 rounded-2xl outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 dark:text-slate-500 uppercase mb-2 ml-1">Password</label>
                <input type="password" id="login-password" placeholder="••••••••" required
                    class="w-full px-6 py-4 bg-slate-50 dark:bg-slate-900/50 border border-slate-100 dark:border-slate-700 rounded-2xl outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all">
            </div>
            <button type="submit" 
                class="w-full py-5 bg-primary dark:bg-sky-600 text-white font-bold rounded-2xl shadow-sm hover:shadow-md transition-all border border-primary dark:shadow-none dark:border-sky-600 hover:scale-[1.02] active:scale-[0.98] transition-all">
                Sign In
            </button>
        </form>
        
        <div class="mt-8 text-center">
            <p class="text-slate-500 dark:text-slate-400 dark:text-slate-500">New to MedRemind? <a href="register.html" class="text-primary font-bold">Create Account</a></p>
        </div>
    </div>

    
    
</body>
</html>
