<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adherence History - MedRemind Lumina</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/css/style.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#0ea5e9', secondary: '#10b981', danger: '#ef4444' },
                    fontFamily: { display: ['Outfit', 'sans-serif'] }
                }
            }
        }
    </script>
</head>

<body class="bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-slate-100">
    <div id="history-app" class="animate-slide-up">
        <div class="flex items-center justify-between mb-8">
            <h2 class="text-3xl font-display font-bold text-slate-800 dark:text-slate-100">Adherence History</h2>
            <button onclick="exportHistory()"
                class="px-6 py-3 bg-white border border-transparent dark:border-slate-700 rounded-xl text-slate-600 dark:text-slate-300 font-bold flex items-center gap-2 hover:bg-slate-50 dark:bg-slate-900/50 transition-all shadow-sm dark:shadow-none">
                <i data-lucide="download" class="w-5 h-5 text-slate-400 dark:text-slate-500"></i> Export CSV
            </button>
        </div>

        <!-- Feature 2: Calendar & Streak -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-8">
            <!-- Streak Counter -->
            <div class="card-white flex flex-col items-center justify-center p-8 text-center bg-gradient-to-br from-orange-50 to-white border-orange-100 shadow-sm dark:shadow-none">
                <div class="w-16 h-16 bg-orange-100 text-orange-500 rounded-2xl flex items-center justify-center mb-4 shadow-inner">
                    <i data-lucide="flame" class="w-8 h-8"></i>
                </div>
                <h3 class="text-xl font-bold text-slate-800 dark:text-slate-100 mb-1">Current Streak</h3>
                <p id="current-streak" class="text-5xl font-display font-bold text-orange-500 tracking-tight">0 <span class="text-xl font-medium text-orange-300">days</span></p>
                <div class="mt-4 pt-4 border-t border-orange-100 w-full flex flex-col gap-2">
                    <div class="flex justify-between items-center px-4">
                        <span class="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest">Longest</span>
                        <span id="longest-streak" class="text-sm font-bold text-slate-700 dark:text-slate-200">0 days</span>
                    </div>
                    <div class="flex justify-between items-center px-4">
                        <span class="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest">Last Missed</span>
                        <span id="last-missed-date" class="text-sm font-bold text-rose-500">None</span>
                    </div>
                </div>
            </div>

            <!-- Calendar Grid -->
            <div class="card-white lg:col-span-2 p-6 flex flex-col shadow-sm dark:shadow-none">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="text-lg font-display font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2">
                        <i data-lucide="calendar" class="w-5 h-5 text-primary"></i> Daily Adherence
                    </h3>
                    <div class="flex items-center gap-4 text-xs font-bold text-slate-500 dark:text-slate-400 dark:text-slate-500">
                        <div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full bg-emerald-400"></div> All Taken</div>
                        <div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full bg-rose-400"></div> Missed</div>
                        <div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full bg-slate-200"></div> No Data</div>
                    </div>
                </div>
                <!-- Horizontal scrolling list of days -->
                <div id="calendar-grid" class="flex gap-2 overflow-x-auto pb-4 scrollbar-hide snap-x items-center">
                    <!-- Injected by JS -->
                </div>
            </div>
        </div>

        <div class="card-white p-6 mb-8">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-2 ml-1">Search
                        Medicine</label>
                    <div class="relative">
                        <i data-lucide="search"
                            class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                        <input type="text" id="filter-name" placeholder="Filter by name..."
                            class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-900/50 border border-transparent dark:border-slate-700 rounded-xl text-sm outline-none focus:ring-2 focus:ring-primary/10">
                    </div>
                </div>
                <div>
                    <label
                        class="block text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-2 ml-1">Status</label>
                    <div class="relative">
                        <i data-lucide="activity" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                        <select id="filter-status"
                            class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-900/50 border border-transparent dark:border-slate-700 rounded-xl text-sm outline-none focus:ring-2 focus:ring-primary/10 appearance-none">
                            <option value="all">All Statuses</option>
                            <option value="taken">Taken</option>
                            <option value="skipped">Missed</option>
                        </select>
                        <i data-lucide="chevron-down" class="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none"></i>
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-2 ml-1">Date
                        Range</label>
                    <div class="relative">
                        <i data-lucide="calendar-days" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                        <select id="filter-date"
                            class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-900/50 border border-transparent dark:border-slate-700 rounded-xl text-sm outline-none focus:ring-2 focus:ring-primary/10 appearance-none">
                            <option value="all">All Time</option>
                            <option value="today">Today</option>
                            <option value="week">Last 7 Days</option>
                            <option value="month">Last 30 Days</option>
                        </select>
                        <i data-lucide="chevron-down" class="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none"></i>
                    </div>
                </div>
                <div class="flex items-end">
                    <button onclick="applyManualFilters()"
                        class="w-full py-3 bg-primary/10 text-primary dark:bg-sky-600/20 dark:text-sky-400 font-bold rounded-xl hover:bg-primary hover:text-white dark:hover:bg-sky-500 dark:hover:text-white transition-all flex items-center justify-center gap-2">
                        <i data-lucide="filter" class="w-5 h-5"></i> Apply Filters
                    </button>
                </div>
            </div>
        </div>

        <div class="card-white overflow-hidden border-none shadow-sm border border-transparent dark:border-slate-700 dark:shadow-none">
            <table class="w-full text-left">
                <thead>
                    <tr class="bg-slate-50 dark:bg-slate-900/50 border-b border-transparent dark:border-slate-700">
                        <th class="px-8 py-5 text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest">Date & Time
                        </th>
                        <th class="px-8 py-5 text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest">Medication
                        </th>
                        <th class="px-8 py-5 text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest">Status</th>
                        <th class="px-8 py-5 text-right text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest">
                            Assignment / Method</th>
                    </tr>
                </thead>
                <tbody id="history-list" class="divide-y divide-slate-50">
                    <!-- History logs will be injected here -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/layout.js"></script>
    <script src="/js/history.js"></script>
</body>

</html>
</body>

</html>
